name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create user via Django admin command and setup
        run: |
          # 1. Создаем суперпользователя
          docker compose exec -T web_recipes sh -c "
            cd /opt/recipes && \
            echo \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='testuser').delete(); User.objects.create_superuser('testuser', 'test@example.com', 'testpass123')\" | \
            venv/bin/python manage.py shell
          "
          
          sleep 3
          
          # 2. Настраиваем пользователя
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User
          from cookbook.models import Space, UserPreference
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              user = User.objects.get(username='testuser')
              
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              space, created = Space.objects.get_or_create(
                  name='Default Space',
                  defaults={'created_by': user}
              )
              
              if not created:
                  space.created_by = user
                  space.save()
              
              if not space.user.filter(id=user.id).exists():
                  space.user.add(user)
              
              pref, _ = UserPreference.objects.get_or_create(
                  user=user,
                  defaults={'space': space}
              )
              
              if pref.space != space:
                  pref.space = space
                  pref.save()
              
              print(f"✓ User: {user.username}, Space: {space.name} (ID: {space.id})")
          EOF
          
          # 3. Ждем API
          echo "⏳ Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost/api/ > /dev/null 2>&1; then
              echo "✓ API ready!"
              break
            fi
            sleep 2
          done
          
          # 4. Создаем токен с правами "read write"
          echo " Creating token with 'read write' scope..."
          
          TOKEN_RESPONSE=$(curl -s -X POST \
            http://localhost/api/access-token/ \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{
              "expires": "2026-12-31T23:59:59Z",
              "scope": "read write"
            }')
          
          echo "API Response: $TOKEN_RESPONSE"
          
          # Извлекаем токен и scope
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('token', ''))" 2>/dev/null)
          SCOPE=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('scope', ''))" 2>/dev/null)
          TOKEN_ID=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('id', ''))" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"token":\s*"\K[^"]+')
          fi
          
          # Сохраняем
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token created: ${TOKEN:0:8}...${TOKEN: -4}"
            echo "✓ Token ID: $TOKEN_ID"
            echo "✓ Scope: $SCOPE"
          else
            echo "❌ Token creation failed!"
            echo "Full response: $TOKEN_RESPONSE"
            
            # Диагностика
            echo ""
            echo "Testing basic auth:"
            curl -v -u testuser:testpass123 http://localhost/api/user-preference/ 2>&1 | head -30
            
            exit 1
          fi

      - name: Verify token in database
        run: |
          # Проверяем токен в базе данных
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User
          from cookbook.models import AccessToken
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              user = User.objects.get(username='testuser')
              
              # Tandoor использует кастомную модель AccessToken (не DRF Token!)
              try:
                  tokens = AccessToken.objects.filter(user=user)
                  print(f"\n=== Access Tokens for {user.username} ===")
                  print(f"Total tokens: {tokens.count()}\n")
                  
                  for token in tokens:
                      print(f"Token ID: {token.id}")
                      print(f"Token: {token.token[:10]}...{token.token[-4:]}")
                      print(f"Scope: {token.scope}")
                      print(f"Expires: {token.expires}")
                      print(f"Created: {token.created}")
                      print("---")
              except Exception as e:
                  print(f"Error checking tokens: {e}")
                  
                  # Может быть другая модель
                  from rest_framework.authtoken.models import Token as DRFToken
                  drf_tokens = DRFToken.objects.filter(user=user)
                  print(f"DRF Tokens: {drf_tokens.count()}")
          EOF

      - name: Verify token works
        run: |
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          echo " Testing token with write permissions..."
          echo "Token: ${TANDOOR_TOKEN:0:8}...${TANDOOR_TOKEN: -4}"
          
          # Тест 1: READ - GET /api/recipe/
          echo ""
          echo "Test 1: READ /api/recipe/"
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.txt | head -c 200
          echo ""
          
          # Тест 2: WRITE - POST /api/recipe/
          echo ""
          echo "Test 2: WRITE (create recipe)"
          WRITE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "Test Recipe from GHA",
              "description": "Testing write permissions",
              "servings": 4
            }' \
            http://localhost/api/recipe/)
          
          WRITE_CODE=$(echo "$WRITE_RESPONSE" | grep -oP 'HTTP_CODE:\K\d+')
          echo "HTTP $WRITE_CODE"
          echo "$WRITE_RESPONSE" | head -c 300
          echo ""
          
          # Проверка результатов
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ READ permission works!"
          else
            echo "❌ READ failed with HTTP $HTTP_CODE"
          fi
          
          if [ "$WRITE_CODE" = "200" ] || [ "$WRITE_CODE" = "201" ]; then
            echo "✓ WRITE permission works!"
          else
            echo " WRITE returned HTTP $WRITE_CODE (may be expected)"
          fi
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo ""
            echo "✓✓✓ Token is working correctly!"
          else
            echo ""
            echo "❌ Token test failed"
            exit 1
          fi

      - name: Run API tests
        run: |
          source venv/bin/activate
          
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          export APP_URL=http://localhost
          
          echo " Running tests..."
          echo "Token: ${TANDOOR_TOKEN:0:8}..."
          
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        env:
          APP_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}

      - name: Test token manually
        run: |
          curl -v -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/

      - name: Check ALL permissions
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import Permission
          print('Все доступные права (первые 50):')
          for i, p in enumerate(Permission.objects.all()[:50]):
              print(f'{i+1:2d}. {p.content_type.app_label}.{p.codename} - {p.name}')
          "

      - name: Check user permissions
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import User
          user = User.objects.get(username='testuser')
          print(f'User: {user.username}')
          print('Permissions:')
          for perm in user.get_all_permissions():
              print(f'  - {perm}')
          "

      - name: Check user space
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import User
          from cookbook.models import Space
          from django_scopes import scopes_disabled

          with scopes_disabled():
              user = User.objects.get(username='testuser')
              spaces = user.space_set.all()
              print(f'User spaces: {[s.name for s in spaces]}')
          if spaces:
              space = spaces[0]
              print(f'Active space: {space.name}')
              print(f'Space owner: {space.created_by.username if space.created_by else None}')
          "

      - name: Check user in DB
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import User
          user = User.objects.get(username='testuser')
          print(f'User exists: {user.username}')
          print(f'Active: {user.is_active}')
          print(f'Groups: {[g.name for g in user.groups.all()]}')
          "    
     
      - name: Wait for API to be ready
        run: |
          echo " Waiting for API endpoint..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/ || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo " API is accessible (HTTP $HTTP_CODE)!"
              break
            fi
            echo " Attempt $attempt/$max_attempts: API returned HTTP $HTTP_CODE"
            sleep 2
            attempt=$((attempt + 1))
          done

      - name: Run API tests
        run: |
          source venv/bin/activate
          export APP_URL=http://localhost
          mkdir -p allure-results
          
          echo " Running API tests with marker 'api'..."
          echo "TANDOOR_TOKEN is set: $(if [ -n "$TANDOOR_TOKEN" ]; then echo "есть токен"; else echo "нет токена"; fi)"
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            --disable-warnings || true
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TEST_ENV: github-actions

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
