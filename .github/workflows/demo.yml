name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_ENGINE=django.db.backends.postgresql
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db_recipes
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,web_recipes
          CSRF_TRUSTED_ORIGINS=http://localhost
          DEBUG=1
          SOCIAL_DEFAULT_ACCESS=1
          SOCIAL_DEFAULT_GROUP=Default
          EOF
          echo "✓ .env file created"
          echo "✓ File location: $(pwd)/.env"
          ls -la .env

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d
          echo "⏳ Waiting for application to be ready..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost > /dev/null 2>&1; then
              echo "✓ Application is ready!"
              break
            fi
            echo "Waiting... ($counter/$timeout)"
            sleep 2
            counter=$((counter + 2))
          done

      - name: Run database migrations  
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py migrate
          echo "✓ Database migrations completed"

      - name: Show container logs
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker compose ps
          echo "=== Web Container Logs ==="
          docker compose logs web_recipes --tail=50

      - name: Create user via Django admin command and setup
        run: |
          # 1. Создаем суперпользователя
          docker compose exec -T web_recipes sh -c "
            cd /opt/recipes && \
            echo \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='testuser').delete(); User.objects.create_superuser('testuser', 'test@example.com', 'testpass123')\" | \
            venv/bin/python manage.py shell
          "
          
          sleep 3
          
          # 2. Настраиваем пользователя
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User
          from cookbook.models import Space, UserPreference
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              user = User.objects.get(username='testuser')
              
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              space, created = Space.objects.get_or_create(
                  name='Default Space',
                  defaults={'created_by': user}
              )
              
              if not created:
                  space.created_by = user
                  space.save()
              
              if not space.user.filter(id=user.id).exists():
                  space.user.add(user)
              
              pref, _ = UserPreference.objects.get_or_create(
                  user=user,
                  defaults={'space': space}
              )
              
              if pref.space != space:
                  pref.space = space
                  pref.save()
              
              print(f"✓ User: {user.username}, Space: {space.name} (ID: {space.id})")
          EOF
          
          # 3. Ждем API
          echo "⏳ Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost/api/ > /dev/null 2>&1; then
              echo "✓ API ready!"
              break
            fi
            sleep 2
          done
          
          # 4. Создаем токен с правами "read write"
          echo "🔑 Creating token with 'read write' scope..."
          
          TOKEN_RESPONSE=$(curl -s -X POST \
            http://localhost/api/access-token/ \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{
              "expires": "2026-12-31T23:59:59Z",
              "scope": "read write"
            }')
          
          echo "API Response: $TOKEN_RESPONSE"
          
          # Извлекаем токен
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('token', ''))" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"token":\s*"\K[^"]+')
          fi
          
          # Сохраняем
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token created: ${TOKEN:0:8}...${TOKEN: -4}"
          else
            echo "❌ Token creation failed!"
            echo "Full response: $TOKEN_RESPONSE"
            exit 1
          fi

      - name: Verify token works
        run: |
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          echo "🧪 Testing token..."
          echo "Token: ${TANDOOR_TOKEN:0:8}...${TANDOOR_TOKEN: -4}"
          
          # Тест READ
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.txt | head -c 200
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓✓✓ Token works!"
          else
            echo "❌ Token test failed"
            curl -v -H "Authorization: Bearer $TANDOOR_TOKEN" \
              http://localhost/api/recipe/ 2>&1 | head -30
            exit 1
          fi

      - name: Run API tests
        run: |
          source venv/bin/activate
          
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          export APP_URL=http://localhost
          
          echo "🚀 Running tests..."
          echo "Token: ${TANDOOR_TOKEN:0:8}..."
          
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
