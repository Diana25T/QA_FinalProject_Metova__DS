name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_ENGINE=django.db.backends.postgresql
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db_recipes
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,web_recipes
          CSRF_TRUSTED_ORIGINS=http://localhost
          DEBUG=1
          SOCIAL_DEFAULT_ACCESS=1
          SOCIAL_DEFAULT_GROUP=Default
          EOF
          echo "✓ .env file created"

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d
          echo "⏳ Waiting for application..."
          for i in {1..30}; do
            if curl -s http://localhost > /dev/null 2>&1; then
              echo "✓ Application ready!"
              break
            fi
            sleep 2
          done

      - name: Run database migrations  
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py migrate
          echo "✓ Migrations completed"

      - name: Create user with active space
        run: |
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User, Group, Permission
          from cookbook.models import Space, UserPreference, UserSpace
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              old_user = User.objects.filter(username='testuser').first()
              if old_user:
                  Space.objects.filter(created_by=old_user).delete()
                  old_user.delete()
              
              # Создаем User
              user = User.objects.create_superuser(
                  username='testuser',
                  password='testpass123',
                  email='test@example.com'
              )
              
              # Группа с правами
              group, created = Group.objects.get_or_create(name='Default')
              cookbook_perms = Permission.objects.filter(content_type__app_label='cookbook')
              for perm in cookbook_perms:
                  group.permissions.add(perm)
              user.groups.add(group)
              
              # Email
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              # Создаем Space
              space = Space.objects.create(
                  name='Test Space',
                  created_by=user,
                  space_setup_completed=True,
                  allow_sharing=True,
                  demo=False
              )
              
              # UserSpace связь
              UserSpace.objects.create(
                  user=user,
                  space=space,
                  active=True
              )
              
              # Добавляем user в space через Many-to-Many
              user.space_set.add(space)
              
              # UserPreference
              UserPreference.objects.get_or_create(user=user)
              
              # Проверяем
              user.refresh_from_db()
              user_spaces = user.space_set.all()
              
              print(f"✓ User: {user.username}")
              print(f"  Groups: {[g.name for g in user.groups.all()]}")
              print(f"  Member of spaces: {[s.name for s in user_spaces]}")
              print(f"  Space setup completed: {space.space_setup_completed}")
              
              # Проверяем UserSpace
              us = UserSpace.objects.get(user=user, space=space)
              print(f"  UserSpace active: {us.active}")
          EOF

      - name: Login and test
        run: |
          echo "🔐 Logging in..."
          
          CSRF_TOKEN=$(curl -s -c /tmp/cookies.txt http://localhost/accounts/login/ \
            | grep -oP 'csrfmiddlewaretoken.*?value="\K[^"]+' | head -1)
          
          curl -s -L -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -X POST http://localhost/accounts/login/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Referer: http://localhost/accounts/login/" \
            -d "csrfmiddlewaretoken=$CSRF_TOKEN&login=testuser&password=testpass123" \
            > /dev/null
          
          echo "✓ Login completed"
          
          # Тестируем главную
          echo ""
          echo "Testing home page:"
          HOME_RESPONSE=$(curl -s -b /tmp/cookies.txt http://localhost/)
          HOME_TITLE=$(echo "$HOME_RESPONSE" | grep -oP '<title>\K[^<]+')
          
          echo "Page title: $HOME_TITLE"
          
          if [ "$HOME_TITLE" = "No Permissions" ]; then
            echo "❌ Still No Permissions!"
            
            # Выводим больше информации
            echo "$HOME_RESPONSE" | grep -A 3 "No Permissions"
            
            # Смотрим логи контейнера
            echo ""
            echo "Container logs (last 30 non-static lines):"
            docker compose logs web_recipes --tail=100 | grep -v "GET /static" | grep -v "GET /media" | tail -30
            
            exit 1
          fi
          
          echo "✓ Home page accessible!"
          
          # Тестируем API
          echo ""
          echo "🧪 Testing API..."
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -b /tmp/cookies.txt \
            http://localhost/api/recipe/)
          
          echo "HTTP $HTTP_CODE"
          
          if grep -q "<!DOCTYPE html>" /tmp/response.txt; then
            echo "❌ Got HTML"
            cat /tmp/response.txt | grep -oP '<title>\K[^<]+'
            exit 1
          fi
          
          cat /tmp/response.txt | head -c 300
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓✓✓ API works!"
          else
            exit 1
          fi

      - name: Get API token
        run: |
          echo "🔑 Getting token..."
          
          CSRF_TOKEN=$(grep csrftoken /tmp/cookies.txt | awk '{print $7}')
          
          TOKEN_RESPONSE=$(curl -s -X POST \
            -b /tmp/cookies.txt \
            -H "Content-Type: application/json" \
            -H "X-CSRFToken: $CSRF_TOKEN" \
            -d '{"expires": "2026-12-31T23:59:59Z", "scope": "read write"}' \
            http://localhost/api/access-token/)
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))" 2>/dev/null)
          
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token: ${TOKEN:0:8}..."
          fi

      - name: Run API tests
        run: |
          source venv/bin/activate
          export TANDOOR_TOKEN=$(cat token.txt 2>/dev/null || echo "")
          export BASE_URL=http://localhost
          
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        continue-on-error: true
        env:
          BASE_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
