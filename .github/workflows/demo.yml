name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_ENGINE=django.db.backends.postgresql
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db_recipes
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,web_recipes
          CSRF_TRUSTED_ORIGINS=http://localhost
          DEBUG=1
          SOCIAL_DEFAULT_ACCESS=1
          SOCIAL_DEFAULT_GROUP=Default
          EOF
          echo "✓ .env file created"
          echo "✓ File location: $(pwd)/.env"
          ls -la .env

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d
          echo "⏳ Waiting for application to be ready..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost > /dev/null 2>&1; then
              echo "✓ Application is ready!"
              break
            fi
            echo "Waiting... ($counter/$timeout)"
            sleep 2
            counter=$((counter + 2))
          done

      - name: Run database migrations  
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py migrate
          echo "✓ Database migrations completed"

      - name: Show container logs
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker compose ps
          echo "=== Web Container Logs ==="
          docker compose logs web_recipes --tail=50
          
      - name: Explore Tandoor models structure
        run: |
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from cookbook.models import Space, UserPreference
          from django.contrib.auth.models import User
          
          print("\n=== User Model Fields ===")
          user_fields = [f.name for f in User._meta.get_fields()]
          print(user_fields)
          
          print("\n=== Space Model Fields ===")
          space_fields = [f.name for f in Space._meta.get_fields()]
          print(space_fields)
          
          print("\n=== UserPreference Model Fields ===")
          pref_fields = [f.name for f in UserPreference._meta.get_fields()]
          print(pref_fields)
          
          print("\n=== Relations ===")
          print("User -> Space relation:", [f.name for f in User._meta.get_fields() if 'space' in f.name.lower()])
          print("Space -> User relation:", [f.name for f in Space._meta.get_fields() if 'user' in f.name.lower()])
          EOF

      - name: Create user and token
        run: |
          # Создаем ОБЫЧНОГО пользователя с правами
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User, Group, Permission
          from django.contrib.contenttypes.models import ContentType
          from cookbook.models import Space, UserPreference, Recipe
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              # Удаляем старого пользователя
              User.objects.filter(username='testuser').delete()
              
              # Создаем ОБЫЧНОГО активного пользователя
              user = User.objects.create_user(
                  username='testuser',
                  password='testpass123',
                  email='test@example.com',
                  is_active=True,
                  is_staff=False,      # НЕ staff
                  is_superuser=False   # НЕ superuser
              )
              
              # Получаем или создаем группу с правами
              group, _ = Group.objects.get_or_create(name='Recipe Users')
              
              # Добавляем права на рецепты
              recipe_ct = ContentType.objects.get_for_model(Recipe)
              permissions = [
                  'view_recipe',
                  'add_recipe',
                  'change_recipe',
                  'delete_recipe',
              ]
              
              for perm_codename in permissions:
                  try:
                      perm = Permission.objects.get(
                          codename=perm_codename,
                          content_type=recipe_ct
                      )
                      group.permissions.add(perm)
                  except Permission.DoesNotExist:
                      print(f"Warning: Permission {perm_codename} not found")
              
              # Добавляем пользователя в группу
              user.groups.add(group)
              
              # Подтверждаем email
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              # Создаем Space с пользователем как владельцем
              space, created = Space.objects.get_or_create(
                  name='Test Space',
                  defaults={'created_by': user}
              )
              
              if not created and space.created_by != user:
                  space.created_by = user
                  space.save()
              
              # UserPreference - связывает пользователя со Space
              pref, _ = UserPreference.objects.get_or_create(
                  user=user,
                  defaults={'space': space}
              )
              
              if pref.space != space:
                  pref.space = space
                  pref.save()
              
              # Проверяем что получилось
              print(f"✓ User created: {user.username}")
              print(f"  is_superuser: {user.is_superuser}")
              print(f"  is_staff: {user.is_staff}")
              print(f"  is_active: {user.is_active}")
              print(f"  groups: {[g.name for g in user.groups.all()]}")
              print(f"  permissions: {list(user.get_all_permissions())[:5]}")
              print(f"  space: {space.name} (ID: {space.id})")
              print(f"  space owner: {space.created_by.username if space.created_by else 'None'}")
          EOF
          
          sleep 3
          
          # Ждем API
          echo " Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost/api/ > /dev/null 2>&1; then
              echo "✓ API ready!"
              break
            fi
            sleep 2
          done
          
          # Получаем токен через API
          echo " Creating token with 'read write' scope..."
          TOKEN_RESPONSE=$(curl -s -X POST \
            http://localhost/api/access-token/ \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"expires": "2026-12-31T23:59:59Z", "scope": "read write"}')
          
          echo "Token Response: $TOKEN_RESPONSE"
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('token', ''))" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"token":\s*"\K[^"]+')
          fi
          
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token: ${TOKEN:0:8}...${TOKEN: -4}"
          else
            echo "❌ Failed to get token!"
            echo "Response: $TOKEN_RESPONSE"
            
            # Проверяем может ли пользователь войти
            echo ""
            echo "Testing basic auth:"
            curl -v -u testuser:testpass123 http://localhost/api/user-preference/ 2>&1 | head -30
            
            exit 1
          fi

      - name: Verify user permissions
        run: |
          echo " Checking user permissions in database..."
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User
          from cookbook.models import Space, UserPreference
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              user = User.objects.get(username='testuser')
              
              print(f"\n=== User Info ===")
              print(f"Username: {user.username}")
              print(f"is_superuser: {user.is_superuser} (should be False)")
              print(f"is_staff: {user.is_staff} (should be False)")
              print(f"is_active: {user.is_active} (should be True)")
              
              print(f"\n=== Groups ===")
              for group in user.groups.all():
                  print(f"- {group.name}")
                  print(f"  Permissions: {group.permissions.count()}")
              
              print(f"\n=== User Permissions ===")
              perms = user.get_all_permissions()
              if perms:
                  for perm in list(perms)[:10]:
                      print(f"- {perm}")
              else:
                  print("WARNING: No permissions found!")
              
              print(f"\n=== Space Access ===")
              try:
                  pref = UserPreference.objects.get(user=user)
                  if pref.space:
                      space = pref.space
                      print(f"Default space: {space.name}")
                      print(f"Space owner: {space.created_by.username if space.created_by else 'None'}")
                      print(f"User is owner: {space.created_by == user}")
                  else:
                      print("WARNING: No default space!")
              except UserPreference.DoesNotExist:
                  print("WARNING: No UserPreference found!")
          EOF

      - name: Verify token works
        run: |
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          echo "Testing token..."
          echo "Token: ${TANDOOR_TOKEN:0:8}...${TANDOOR_TOKEN: -4}"
          
          # Тест READ
          echo ""
          echo "Test 1: GET /api/recipe/"
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.txt | head -c 200
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ READ permission works!"
          else
            echo "❌ READ failed with HTTP $HTTP_CODE"
            
            # Пробуем другие endpoints
            echo ""
            echo "Testing /api/user-preference/:"
            curl -s -H "Authorization: Bearer $TANDOOR_TOKEN" \
              http://localhost/api/user-preference/ | head -c 200
            
            echo ""
            echo ""
            echo "Testing /api/space/:"
            curl -s -H "Authorization: Bearer $TANDOOR_TOKEN" \
              http://localhost/api/space/ | head -c 200
            
            exit 1
          fi

      - name: Run API tests
        run: |
          source venv/bin/activate
          
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          export APP_URL=http://localhost
          
          echo "🚀 Running tests..."
          echo "Token: ${TANDOOR_TOKEN:0:8}..."
          
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}


      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
