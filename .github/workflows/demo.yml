name: Demo Pipeline for Portfolio

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze-project:
    runs-on: ubuntu-latest
    name:  Analyze Project Structure

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show project summary
      run: |
        echo "========================================"
        echo " TEST AUTOMATION PROJECT SUMMARY"
        echo "========================================"
        echo ""
        echo " PROJECT STRUCTURE:"
        echo "---------------------"
        find . -type f -name "*.py" | grep -v __pycache__ | sort
        echo ""
        echo "TEST STATISTICS:"
        echo "------------------"
        echo "- Test files: $(find tests/ -name 'test_*.py' 2>/dev/null | wc -l)"
        echo "- Test functions: $(grep -r 'def test_' tests/ 2>/dev/null | wc -l)"
        echo "- Allure decorators: $(grep -r '@allure' tests/ 2>/dev/null | wc -l)"
        echo ""
        echo " LOCAL TEST RESULTS (from screenshot):"
        echo "----------------------------------------"
        echo "17 tests passed in 303.65s (0:05:03)"
        echo ""
        echo " NOTE:"
        echo "Full test execution requires VPN access."
        echo "This pipeline demonstrates CI/CD setup."

    - name: Validate syntax
      run: |
        echo " Validating Python files..."
        find . -name "*.py" -type f | head -5 | while read file; do
          if python -m py_compile "$file"; then
            echo "  ✓ $(basename "$file")"
          else
            echo "  ✗ $(basename "$file")"
          fi
        done