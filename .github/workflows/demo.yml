name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_ENGINE=django.db.backends.postgresql
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db_recipes
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,web_recipes
          CSRF_TRUSTED_ORIGINS=http://localhost
          DEBUG=1
          SOCIAL_DEFAULT_ACCESS=1
          SOCIAL_DEFAULT_GROUP=Default
          EOF
          echo " Created .env file"

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d
          echo " Waiting for application to be ready..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo " Waiting... ($counter/$timeout)"
            sleep 2
            counter=$((counter + 1))
          done
      - name: Run database migrations  
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py migrate
          echo " Database migrations completed"


      - name: Show container logs
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker compose ps
          echo "=== Web Container Logs ==="
          docker compose logs web_recipes --tail=50

      - name: Create test user and token
        run: |
          # Сначала создаем пользователя
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell << 'EOF'
          from django.contrib.auth.models import User, Group, Permission
          from django.contrib.contenttypes.models import ContentType
          from cookbook.models import UserPreference, Space, Recipe
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled

          with scopes_disabled():
              # Получаем или создаем пространство
              space, _ = Space.objects.get_or_create(name='Default Space')
              
              # Создаем группу с правами
              group, _ = Group.objects.get_or_create(name='Default')

              # Права для рецептов
              recipe_ct = ContentType.objects.get_for_model(Recipe)
              recipe_perms = []
              for codename in ['add_recipe', 'change_recipe', 'delete_recipe', 'view_recipe']:
                  perm, created = Permission.objects.get_or_create(
                      codename=codename,
                      content_type=recipe_ct,
                      defaults={'name': f'Can {codename.replace("_", " ")}'}
                  )
                  recipe_perms.append(perm)

              # Добавляем все права группе
              group.permissions.add(*recipe_perms)

              # Удаляем старого пользователя если есть
              User.objects.filter(username='testuser').delete()

              # Создаем активного пользователя
              user = User.objects.create_user(
                  username='testuser',
                  password='testpass123',
                  email='test@example.com',
                  is_active=True
              )

              # Добавляем пользователя в группу
              user.groups.add(group)

              # Подтверждаем email
              EmailAddress.objects.create(
                  user=user,
                  email=user.email,
                  verified=True,
                  primary=True
              )

              # Добавляем пользователя в пространство
              user.space_set.add(space)

              # Делаем пользователя владельцем пространства
              space.created_by = user
              space.save()
              
              # Создаем настройки пользователя
              UserPreference.objects.get_or_create(user=user)
              
              print(" User created successfully")
          EOF

                  # Теперь создаем токен через API (пользователь уже существует!)
                  TOKEN=$(curl -s -X POST http://localhost/api/access-token/ \
                    -H "Content-Type: application/json" \
                    -u testuser:testpass123 \
                    -d '{"expires": "2026-12-31T23:59:59Z", "scope": "read write"}' \
                    | jq -r '.token')
          
                  echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
                  echo "::add-mask::$TOKEN"
          
                  if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
                    echo " Token successfully extracted"
                  else
                    echo " Failed to extract token"
                    exit 1
                  fi
        
      - name: Test token manually
        run: |
            curl -v -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/

      - name: Check ALL permissions
        run: |
            docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
            from django.contrib.auth.models import Permission
            print('Все доступные права (первые 50):')
            for i, p in enumerate(Permission.objects.all()[:50]):
                print(f'{i+1:2d}. {p.content_type.app_label}.{p.codename} - {p.name}')
            "
      - name: Check user permissions
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import User
          user = User.objects.get(username='testuser')
          print(f'User: {user.username}')
          print('Permissions:')
          for perm in user.get_all_permissions():
              print(f'  - {perm}')
          "

      - name: Check user space
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
          from django.contrib.auth.models import User
          from cookbook.models import Space
          from django_scopes import scopes_disabled

          with scopes_disabled():
              user = User.objects.get(username='testuser')
              spaces = user.space_set.all()
              print(f'User spaces: {[s.name for s in spaces]}')
          if spaces:
              space = spaces[0]
              print(f'Active space: {space.name}')
              print(f'Space owner: {space.created_by.username if space.created_by else None}')
          "

      - name: Check user in DB
        run: |
            docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py shell -c "
            from django.contrib.auth.models import User
            user = User.objects.get(username='testuser')
            print(f'User exists: {user.username}')
            print(f'Active: {user.is_active}')
            print(f'Groups: {[g.name for g in user.groups.all()]}')
            "    
     
      - name: Wait for API to be ready
        run: |
          echo " Waiting for API endpoint..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/ || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo " API is accessible (HTTP $HTTP_CODE)!"
              break
            fi
            echo " Attempt $attempt/$max_attempts: API returned HTTP $HTTP_CODE"
            sleep 2
            attempt=$((attempt + 1))
          done

      - name: Run API tests
        run: |
          source venv/bin/activate
          export APP_URL=http://localhost
          mkdir -p allure-results
          
              echo " Running API tests with marker 'api'..."
              echo "TANDOOR_TOKEN is set: $(if [ -n "$TANDOOR_TOKEN" ]; then echo "есть токен"; else echo "нет токена"; fi)"
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            --disable-warnings || true
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TEST_ENV: github-actions

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
