name: Test Pipeline with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install allure-pytest pytest requests

      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DB_ENGINE=django.db.backends.postgresql
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db_recipes
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1,web_recipes
          CSRF_TRUSTED_ORIGINS=http://localhost
          DEBUG=1
          SOCIAL_DEFAULT_ACCESS=1
          SOCIAL_DEFAULT_GROUP=Default
          EOF
          echo "✓ .env file created"
          echo "✓ File location: $(pwd)/.env"
          ls -la .env

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d
          echo "⏳ Waiting for application to be ready..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost > /dev/null 2>&1; then
              echo "✓ Application is ready!"
              break
            fi
            echo "Waiting... ($counter/$timeout)"
            sleep 2
            counter=$((counter + 2))
          done

      - name: Run database migrations  
        run: |
          docker compose exec -T web_recipes /opt/recipes/venv/bin/python manage.py migrate
          echo "✓ Database migrations completed"

      - name: Show container logs
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker compose ps
          echo "=== Web Container Logs ==="
          docker compose logs web_recipes --tail=50
          
      - name: Explore Tandoor models structure
        run: |
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from cookbook.models import Space, UserPreference
          from django.contrib.auth.models import User
          
          print("\n=== User Model Fields ===")
          user_fields = [f.name for f in User._meta.get_fields()]
          print(user_fields)
          
          print("\n=== Space Model Fields ===")
          space_fields = [f.name for f in Space._meta.get_fields()]
          print(space_fields)
          
          print("\n=== UserPreference Model Fields ===")
          pref_fields = [f.name for f in UserPreference._meta.get_fields()]
          print(pref_fields)
          
          print("\n=== Relations ===")
          print("User -> Space relation:", [f.name for f in User._meta.get_fields() if 'space' in f.name.lower()])
          print("Space -> User relation:", [f.name for f in Space._meta.get_fields() if 'user' in f.name.lower()])
          EOF

      - name: Create user and token
        run: |
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User, Group, Permission
          from django.contrib.contenttypes.models import ContentType
          from cookbook.models import Space, UserPreference, UserSpace, Recipe
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              User.objects.filter(username='testuser').delete()
              
              # Создаем с is_staff=True для API доступа
              user = User.objects.create_user(
                  username='testuser',
                  password='testpass123',
                  email='test@example.com',
                  is_active=True,
                  is_staff=True,       # ← ИЗМЕНЕНО!
                  is_superuser=False   # Всё равно НЕ superuser
              )
              
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              space, _ = Space.objects.get_or_create(
                  name='Test Space',
                  defaults={'created_by': user}
              )
              
              if space.created_by != user:
                  space.created_by = user
                  space.save()
              
              user.space = space
              user.save()
              
              UserSpace.objects.get_or_create(
                  user=user,
                  space=space,
                  defaults={'active': True}
              )
              
              UserPreference.objects.get_or_create(user=user)
              
              # Добавляем ВСЕ права на cookbook app
              group, _ = Group.objects.get_or_create(name='Recipe Users')
              
              # Получаем все permissions для cookbook app
              cookbook_permissions = Permission.objects.filter(
                  content_type__app_label='cookbook'
              )
              
              for perm in cookbook_permissions:
                  group.permissions.add(perm)
              
              user.groups.add(group)
              
              print(f"✓ User: {user.username}")
              print(f"  is_staff: {user.is_staff}")
              print(f"  is_superuser: {user.is_superuser}")
              print(f"  Active space: {user.space.name if user.space else 'None'}")
              print(f"  Total permissions: {group.permissions.count()}")
              print(f"  Sample permissions: {list(user.get_all_permissions())[:10]}")
          EOF
          
          sleep 3
          
          echo " Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost/api/ > /dev/null 2>&1; then
              echo "✓ API ready!"
              break
            fi
            sleep 2
          done
          
          echo " Creating token..."
          TOKEN_RESPONSE=$(curl -s -X POST \
            http://localhost/api/access-token/ \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"expires": "2026-12-31T23:59:59Z", "scope": "read write"}')
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('token', ''))" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"token":\s*"\K[^"]+')
          fi
          
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token: ${TOKEN:0:8}...${TOKEN: -4}"
          else
            echo "❌ Failed!"
            exit 1
          fi

      - name: Verify token
        run: |
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          echo "Testing token..."
          echo "Token: ${TANDOOR_TOKEN:0:8}...${TANDOOR_TOKEN: -4}"
          
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.txt | head -c 200
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓✓✓ Token works!"
          else
            echo "❌ Still failing with HTTP $HTTP_CODE"
            echo ""
            echo "Full response:"
            cat /tmp/response.txt
            exit 1
          fi
          
      - name: Check Django logs for permission details
        run: |
          echo "🔍 Checking container logs for permission errors..."
          docker compose logs web_recipes --tail=100 | grep -i "permission\|403\|forbidden" || echo "No permission errors in logs"

      - name: Debug - Check API permissions requirements
        run: |
          # Проверяем настройки DRF в контейнере
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.conf import settings
          
          print("\n=== REST Framework Settings ===")
          print(f"DEFAULT_PERMISSION_CLASSES: {getattr(settings, 'REST_FRAMEWORK', {}).get('DEFAULT_PERMISSION_CLASSES', 'Not set')}")
          print(f"DEFAULT_AUTHENTICATION_CLASSES: {getattr(settings, 'REST_FRAMEWORK', {}).get('DEFAULT_AUTHENTICATION_CLASSES', 'Not set')}")
          
          print("\n=== Tandoor Settings ===")
          print(f"SOCIAL_DEFAULT_ACCESS: {getattr(settings, 'SOCIAL_DEFAULT_ACCESS', 'Not set')}")
          print(f"SOCIAL_DEFAULT_GROUP: {getattr(settings, 'SOCIAL_DEFAULT_GROUP', 'Not set')}")
          EOF

      - name: Create user with FULL admin access
        run: |
          # Используем superuser для тестов (это тестовая среда!)
          docker compose exec -T web_recipes sh -c "cd /opt/recipes && venv/bin/python manage.py shell" << 'EOF'
          from django.contrib.auth.models import User
          from cookbook.models import Space, UserPreference, UserSpace
          from allauth.account.models import EmailAddress
          from django_scopes import scopes_disabled
          
          with scopes_disabled():
              User.objects.filter(username='testuser').delete()
              
              # ВРЕМЕННО используем superuser для тестов
              user = User.objects.create_superuser(
                  username='testuser',
                  password='testpass123',
                  email='test@example.com'
              )
              
              EmailAddress.objects.get_or_create(
                  user=user,
                  email=user.email,
                  defaults={'verified': True, 'primary': True}
              )
              
              space, _ = Space.objects.get_or_create(
                  name='Test Space',
                  defaults={'created_by': user}
              )
              
              if space.created_by != user:
                  space.created_by = user
                  space.save()
              
              user.space = space
              user.save()
              
              UserSpace.objects.get_or_create(
                  user=user,
                  space=space,
                  defaults={'active': True}
              )
              
              UserPreference.objects.get_or_create(user=user)
              
              print(f"✓ SUPERUSER created: {user.username}")
              print(f"  For testing purposes only!")
              print(f"  Space: {space.name}")
          EOF
          
          sleep 3
          
          echo "⏳ Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost/api/ > /dev/null 2>&1; then
              echo "✓ API ready!"
              break
            fi
            sleep 2
          done
          
          echo "🔑 Creating token..."
          TOKEN_RESPONSE=$(curl -s -X POST \
            http://localhost/api/access-token/ \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"expires": "2026-12-31T23:59:59Z", "scope": "read write"}')
          
          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('token', ''))" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"token":\s*"\K[^"]+')
          fi
          
          echo "TANDOOR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "$TOKEN" > token.txt
          echo "::add-mask::$TOKEN"
          
          if [ -n "$TOKEN" ] && [ ${#TOKEN} -gt 10 ]; then
            echo "✓ Token: ${TOKEN:0:8}...${TOKEN: -4}"
          else
            echo "❌ Failed!"
            exit 1
          fi

      - name: Verify token with multiple endpoints
        run: |
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          echo "🧪 Testing token on multiple endpoints..."
          echo "Token: ${TANDOOR_TOKEN:0:8}...${TANDOOR_TOKEN: -4}"
          echo ""
          
          # Test 1: User preference (должно работать)
          echo "1. /api/user-preference/"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/user-preference/)
          echo "   HTTP $HTTP_CODE"
          
          # Test 2: Space
          echo "2. /api/space/"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/space/)
          echo "   HTTP $HTTP_CODE"
          
          # Test 3: Recipe
          echo "3. /api/recipe/"
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          echo "   HTTP $HTTP_CODE"
          cat /tmp/response.txt | head -c 200
          echo ""
          
          # Test 4: Food
          echo "4. /api/food/"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/food/)
          echo "   HTTP $HTTP_CODE"
          
          # Test 5: Keyword
          echo "5. /api/keyword/"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/keyword/)
          echo "   HTTP $HTTP_CODE"
          
          echo ""
          
          # Финальная проверка
          RECIPE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TANDOOR_TOKEN" \
            http://localhost/api/recipe/)
          
          if [ "$RECIPE_CODE" = "200" ]; then
            echo "✓✓✓ Token works for recipes!"
          else
            echo "❌ Recipe endpoint still returns HTTP $RECIPE_CODE"
            
            # Показываем полный ответ
            echo ""
            echo "Full recipe response:"
            curl -s -H "Authorization: Bearer $TANDOOR_TOKEN" \
              http://localhost/api/recipe/
            
            echo ""
            echo ""
            echo "Container logs (last 50 lines):"
            docker compose logs web_recipes --tail=50
            
            exit 1
          fi

      - name: Run API tests
        run: |
          source venv/bin/activate
          
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          export APP_URL=http://localhost
          
          echo "🚀 Running tests..."
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}


      - name: Run API tests
        run: |
          source venv/bin/activate
          
          if [ -z "$TANDOOR_TOKEN" ]; then
            export TANDOOR_TOKEN=$(cat token.txt)
          fi
          
          export APP_URL=http://localhost
          
          echo " Running tests..."
          mkdir -p allure-results
          
          pytest tests/ \
            --alluredir=allure-results \
            -m "api" \
            -v \
            --tb=short \
            -s
        continue-on-error: true
        env:
          APP_URL: http://localhost
          TANDOOR_TOKEN: ${{ env.TANDOOR_TOKEN }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: public
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5

      - name: Clean up Docker containers
        if: always()
        run: |
          docker compose down -v
